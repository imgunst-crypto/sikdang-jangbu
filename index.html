<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="식당장부">
<meta name="theme-color" content="#1a5c3a">
<title>식당장부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#1a5c3a;--gl:#e8f4ee;--gm:#2d7a52;
  --blu:#0c447c;--blul:#e6f1fb;
  --rd:#c0392b;--rl:#fdecea;
  --al:#fef3d0;--am:#e8b84b;
  --tx:#1a1a1a;--ts:#6b6b6b;--th:#aaaaaa;
  --br:#e2e0d8;--bg:#f4f3ef;--wh:#ffffff;
  --r:14px;--rs:8px;
}
html{background:#111;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);min-height:100vh;
  max-width:430px;margin:0 auto;
  position:relative;overflow-x:hidden;
}
@media(min-width:431px){body{box-shadow:0 0 60px rgba(0,0,0,.3);}}
.scr{display:none;min-height:100vh;flex-direction:column;animation:fi .25s ease;}
.scr.on{display:flex;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes pi{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes fs{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes lb{from{width:0}to{width:100%}}
.topbar{background:var(--g);padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.tb-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;}
.tb-back:active{background:rgba(255,255,255,.25);}
.tb-info{flex:1;}
.tb-label{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:1px;}
.tb-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.tb-ico{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;position:relative;flex-shrink:0;}
.tb-ico:active{background:rgba(255,255,255,.25);}
.ndot{width:7px;height:7px;background:#e74c3c;border-radius:50%;position:absolute;top:6px;right:6px;border:1.5px solid var(--g);}
.pg{flex:1;padding:14px 12px 90px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.card{background:var(--wh);border-radius:var(--r);border:1.5px solid var(--br);overflow:hidden;}
.card-hdr{padding:12px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;}
.card-hdr i{font-size:17px;color:var(--g);}
.card-hdr span{font-size:12px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.3px;}
.card-hdr .more{margin-left:auto;font-size:12px;color:var(--g);font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;}
.card-body{padding:14px;}
.btn-g{width:100%;padding:14px;background:var(--g);border:none;border-radius:var(--r);font-size:15px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-g:active{background:var(--gm);}
.btn-out{padding:13px 18px;background:var(--wh);border:1.5px solid var(--br);border-radius:var(--r);font-size:14px;font-weight:700;color:var(--ts);cursor:pointer;font-family:inherit;}
.btn-out:active{background:var(--bg);}
.bnav{background:var(--wh);border-top:1px solid var(--br);display:flex;position:sticky;bottom:0;z-index:40;}
.bnav-btn{flex:1;padding:10px 4px 12px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--th);font-size:10px;font-weight:500;font-family:inherit;}
.bnav-btn.on{color:var(--g);}
.bnav-btn i{font-size:22px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12px;font-weight:700;color:var(--ts);}
.iw{position:relative;}
.iw i.pfx{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--th);pointer-events:none;}
.iw input,.iw select{width:100%;padding:12px 12px 12px 38px;border:1.5px solid var(--br);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--tx);background:var(--wh);outline:none;}
.iw input:focus,.iw select:focus{border-color:var(--g);}
.iw input::placeholder{color:var(--th);}
.pi{width:100%;padding:12px 13px;border:1.5px solid var(--br);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--tx);background:var(--wh);outline:none;}
.pi:focus{border-color:var(--g);}
.pi::placeholder{color:var(--th);}
.toggle{width:46px;height:26px;border-radius:13px;background:#e0e0e0;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle.on{background:var(--g);}
.toggle::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle.on::after{left:23px;}
.sb{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;}
.sb-ok{background:var(--gl);color:#085041;}
.sb-wait{background:var(--al);color:#7a5200;}
.sb-rej{background:var(--rl);color:#8b1a14;}
.aw{background:var(--al);border:1.5px solid #f0cc7a;border-radius:var(--rs);padding:10px 12px;display:flex;gap:8px;font-size:12px;color:#5c3c00;}
.aw i{font-size:15px;color:#c07800;flex-shrink:0;margin-top:1px;}
.bb{background:var(--wh);border-top:1px solid var(--br);padding:12px 12px 16px;display:flex;gap:8px;position:sticky;bottom:0;z-index:40;}
.sh{display:flex;align-items:center;gap:6px;padding:2px 0 8px;}
.sh i{font-size:16px;color:var(--g);}
.sh span{font-size:12px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.3px;}
.sh .cnt{font-size:11px;color:var(--th);margin-left:auto;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.mo.open{display:flex;}
.mb{background:var(--wh);border-radius:20px 20px 0 0;width:100%;padding:20px 20px 32px;max-height:85vh;overflow-y:auto;}
.mh{width:36px;height:4px;background:var(--br);border-radius:2px;margin:0 auto 18px;}
.ccr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--br);}
.ccr:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="app">
